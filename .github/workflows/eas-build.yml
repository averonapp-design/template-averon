name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "android, ios ou all"
        required: true
        default: all
      profile:
        description: "Perfil do EAS"
        required: true
        default: production
      env_json:
        description: "Variáveis de ambiente em JSON (injetadas pelo Lovable)"
        required: true
      expo_project_id:
        description: "Expo project id (opcional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ENV_JSON: ${{ inputs.env_json }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Exportar env vars do Lovable
        run: |
          echo "$ENV_JSON" > env.json
          echo "$ENV_JSON" > .env.build
          echo "$ENV_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Configurar Apple ASC API Key (iOS auto-credentials)
        if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
        run: |
          # Suporta tanto APPLE_ASC_KEY_P8 quanto o typo APPLE_ASC_KEY_PR
          ASC_KEY_CONTENT="${{ secrets.APPLE_ASC_KEY_P8 }}"
          if [ -z "$ASC_KEY_CONTENT" ]; then
            ASC_KEY_CONTENT="${{ secrets.APPLE_ASC_KEY_PR }}"
          fi
          echo "::add-mask::$ASC_KEY_CONTENT"
          mkdir -p /tmp/asc
          printf '%s' "$ASC_KEY_CONTENT" > /tmp/asc/AuthKey.p8
          chmod 600 /tmp/asc/AuthKey.p8
          echo "EXPO_ASC_API_KEY_PATH=/tmp/asc/AuthKey.p8" >> "$GITHUB_ENV"
          echo "EXPO_ASC_KEY_ID=${{ secrets.APPLE_ASC_KEY_ID }}" >> "$GITHUB_ENV"
          echo "EXPO_ASC_ISSUER_ID=${{ secrets.APPLE_ASC_ISSUER_ID }}" >> "$GITHUB_ENV"
          echo "EXPO_APPLE_TEAM_ID=X7KA8A2UAW" >> "$GITHUB_ENV"
          echo "EXPO_APPLE_TEAM_TYPE=COMPANY_OR_ORGANIZATION" >> "$GITHUB_ENV"

      - name: Instalar dependências
        run: bun install

      - name: Build
        run: |
          BUILD_FAILED=false
          eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --json > build-result.json || BUILD_FAILED=true
          cat build-result.json
          
          if [ -f build-result.json ] && jq empty build-result.json 2>/dev/null; then
            jq -c 'if type == "array" then . else [.] end' build-result.json > builds.json
            
            jq -c '.[]' builds.json | while read -r build; do
              PLATFORM=$(echo "$build" | jq -r '.platform | ascii_lowercase')
              STATUS=$(echo "$build" | jq -r '.status | ascii_upcase')
              EAS_BUILD_ID=$(echo "$build" | jq -r '.id')
              ARTIFACT_URL=$(echo "$build" | jq -r '.artifacts.applicationArchiveUrl // .artifacts.buildUrl // ""')
              
              echo "Build concluded for $PLATFORM with status $STATUS."
              echo "EAS Build ID: $EAS_BUILD_ID"
              echo "Artifact URL: $ARTIFACT_URL"
              
              curl -X POST "$EXPO_PUBLIC_API_URL/expo-callback" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $EXPO_PUBLIC_API_KEY" \
                -d "{\"github_run_id\": \"$GITHUB_RUN_ID\", \"expo_build_id\": \"$EAS_BUILD_ID\", \"artifact_url\": \"$ARTIFACT_URL\", \"platform\": \"$PLATFORM\", \"status\": \"$STATUS\"}"
            done
          else
            echo "EAS build output JSON not found or invalid."
            curl -X POST "$EXPO_PUBLIC_API_URL/expo-callback" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $EXPO_PUBLIC_API_KEY" \
              -d "{\"github_run_id\": \"$GITHUB_RUN_ID\", \"status\": \"ERRORED\"}"
          fi
          
          if [ "$BUILD_FAILED" = "true" ]; then
            echo "EAS build failed."
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
