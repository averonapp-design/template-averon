name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "android, ios ou all"
        required: true
        default: all
      profile:
        description: "Perfil do EAS"
        required: true
        default: production
      env_json:
        description: "Variáveis de ambiente em JSON (injetadas pelo Lovable)"
        required: true
      expo_project_id:
        description: "Expo project id (opcional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ENV_JSON: ${{ inputs.env_json }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Exportar env vars do Lovable
        run: |
          echo "$ENV_JSON" > .env.build
          # exporta cada chave do JSON como env var do job (vira EXPO_PUBLIC_* automaticamente)
          echo "$ENV_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Instalar dependências
        run: bun install

      - name: Build
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
