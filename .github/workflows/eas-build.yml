name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "android, ios ou all"
        required: true
        default: all
      profile:
        description: "Perfil do EAS"
        required: true
        default: production
      env_json:
        description: "Variáveis de ambiente em JSON (injetadas pelo Lovable)"
        required: true
      expo_project_id:
        description: "Expo project id (opcional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ENV_JSON: ${{ inputs.env_json }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Exportar env vars do Lovable
        run: |
          echo "$ENV_JSON" > .env.build
          echo "$ENV_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Configurar Apple ASC API Key (iOS auto-credentials)
        if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
        run: |
          echo "::add-mask::${{ secrets.APPLE_ASC_KEY_P8 }}"
          mkdir -p /tmp/asc
          printf '%s' "${{ secrets.APPLE_ASC_KEY_P8 }}" > /tmp/asc/AuthKey.p8
          chmod 600 /tmp/asc/AuthKey.p8
          echo "EXPO_ASC_API_KEY_PATH=/tmp/asc/AuthKey.p8" >> "$GITHUB_ENV"
          echo "EXPO_ASC_KEY_ID=${{ secrets.APPLE_ASC_KEY_ID }}" >> "$GITHUB_ENV"
          echo "EXPO_ASC_ISSUER_ID=${{ secrets.APPLE_ASC_ISSUER_ID }}" >> "$GITHUB_ENV"

      - name: Instalar dependências
        run: bun install

      - name: Build
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
