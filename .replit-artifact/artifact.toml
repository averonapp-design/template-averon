kind = "mobile"
previewPath = "/"
title = "NaçãoClub"
version = "1.0.0"
id = "artifacts/averon-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 26164

[services.development]
run = "pnpm --filter @workspace/averon-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/averon-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/averon-mobile", "run", "serve" ]

[services.env]
PORT = "26164"
BASE_PATH = "/"
